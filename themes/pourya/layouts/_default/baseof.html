<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "en" }}" data-theme="{{ .Site.Params.theme | default "auto" }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  {{- if not .Site.Params.hideHeader -}}
  {{- partial "header.html" . -}}
  {{- end -}}
  <main>
    {{- block "main" . }}{{- end }}
  </main>
  {{- partial "footer.html" . -}}
</body>
</html>
