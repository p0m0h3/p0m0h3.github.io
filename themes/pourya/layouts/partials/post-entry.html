<li>
  <span class="post-date">{{ .Date.Format ($.Site.Params.listDateFormat | default "2 Jan 2006") }}</span>
  <div>
    <div class="post-title"><a href="{{ .Permalink }}">{{ .Title }}</a></div>
    {{- if and $.Site.Params.listSummaries .Summary }}
    <div class="post-summary">{{ .Summary | plainify }}</div>
    {{- end }}
  </div>
</li>
