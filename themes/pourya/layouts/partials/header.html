<header>
  <a href="{{ .Site.BaseURL }}" class="site-title">{{ .Site.Title }}</a>
  <div class="header-right">
    {{- with .Site.Menus.main }}
    <nav>
      {{- range . }}
      <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
      {{- end }}
    </nav>
    {{- end }}
    <button class="theme-toggle" aria-label="Toggle theme" onclick="(function(){var h=document.documentElement;var c=h.getAttribute('data-theme')||'auto';var n=c==='auto'?'dark':c==='dark'?'light':'auto';h.setAttribute('data-theme',n);localStorage.setItem('theme',n)})()">◐</button>
  </div>
</header>
