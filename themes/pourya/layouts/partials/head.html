<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>

{{- $desc := .Description | default .Site.Params.description }}
{{- with $desc }}<meta name="description" content="{{ . }}">{{ end }}
<meta name="generator" content="Hugo {{ hugo.Version }}">

<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
{{- with $desc }}<meta property="og:description" content="{{ . }}">{{ end }}
{{- with .Site.Params.avatar }}<meta property="og:image" content="{{ $.Site.BaseURL }}{{ . | strings.TrimPrefix "/" }}">{{ end }}
<meta name="twitter:card" content="summary">

<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ .Site.BaseURL }}index.xml">

{{- $css := resources.Get "css/main.css" | resources.Minify | resources.Fingerprint -}}
<link rel="stylesheet" href="{{ $css.Permalink }}">
<script>
(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t)})();
</script>
